<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Amazon River Restaurant</title>
</head>
<body style="font-family: Arial; text-align:center; background:#e6f2f1;">

  <h1>🌿 Amazon River Restaurant</h1>
  <p>Book your table on the water</p>

  <form onsubmit="book(event)">
    <input type="text" placeholder="Name" required><br><br>
    <input type="date" required><br><br>
    <input type="time" required><br><br>
    <input type="number" placeholder="Guests" required><br><br>
    <button type="submit">Book</button>
  </form>

  <p id="msg"></p>

  <script>
    function book(e) {
      e.preventDefault();
      document.getElementById("msg").innerText = "✅ Reservation sent!";
    }
  </script>

</body>
</html>
